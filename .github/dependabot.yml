version: 2
updates:
  # Keep the SHA-pinned actions in the workflows current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Wait before proposing a brand-new release, so a compromised version has a
    # window to be caught before it lands in a PR here.
    cooldown:
      default-days: 7

  # Cargo dependencies.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

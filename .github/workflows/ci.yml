name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default read-only token; no job here needs more.
permissions:
  contents: read

jobs:
  gate:
    name: Gate (fmt, clippy, build, test, version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Plain builds link the system libusb, so the dev headers are needed here
      # even though the packaged artifacts vendor it.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev jq

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Format
        run: cargo fmt --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --release --locked

      - name: Version consistency
        run: ./scripts/check-version.sh
